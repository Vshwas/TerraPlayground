name: Infrastructure - Operations
description: Report an issue related to Infrastructure of your application.
title: "[Infra] "
labels: ["Infra", "queries"]
assignees:
  - use1
  - use2
  - use3
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the priority level for this issue.
      options:
        - "P1 - Critical: Immediate response to a production issue"
        - "P2 - High: Error or failure to respond from the server"
        - "P3 - Medium: Issue in build / creating application"
        - "P4 - Low: Moderate issue or non-critical issue"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >
        Provide a clear and detailed description of the issue.
        Attach screenshots and links to help debug.
      placeholder: |
        Based on your priority selection:
        - P1: Describe the production outage — what service is down, impact, and timeline.
        - P2: Describe the server error — error codes, affected endpoints, frequency.
        - P3: Describe the build/deploy failure — pipeline, step, and error logs.
        - P4: Describe the moderate issue — what's affected and current workaround.
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the issue, if applicable.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Links
      description: Attach any relevant screenshots, logs, or links to help debug.
    validations:
      required: false
